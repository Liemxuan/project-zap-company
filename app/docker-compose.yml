version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: olympus-postgres
    environment:
      POSTGRES_USER: olympus_user
      POSTGRES_PASSWORD: olympus_password
      POSTGRES_DB: olympus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:latest
    container_name: olympus-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: OlympusBrain
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
