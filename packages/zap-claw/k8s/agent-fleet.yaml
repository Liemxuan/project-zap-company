apiVersion: v1
kind: Namespace
metadata:
  name: olympus-agents
---
# ==========================================
# GATEWAY (API)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zap-claw-gateway
  namespace: olympus-agents
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zap-claw-gateway
  template:
    metadata:
      labels:
        app: zap-claw-gateway
    spec:
      containers:
        - name: gateway
          image: zap-claw:latest
          imagePullPolicy: IfNotPresent
          command: ["npm", "run", "gateway"]
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: zap-claw-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: zap-claw-gateway
  namespace: olympus-agents
spec:
  selector:
    app: zap-claw-gateway
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
  type: ClusterIP

---
# ==========================================
# DAEMON (Background Jobs)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zap-claw-daemon
  namespace: olympus-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zap-claw-daemon
  template:
    metadata:
      labels:
        app: zap-claw-daemon
    spec:
      containers:
        - name: daemon
          image: zap-claw:latest
          imagePullPolicy: IfNotPresent
          command: ["npm", "run", "daemon"]
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: zap-claw-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: zap-claw-daemon
  namespace: olympus-agents
spec:
  selector:
    app: zap-claw-daemon
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP

---
# ==========================================
# JERRY (Orchestrator - Port 3300)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zap-claw-jerry
  namespace: olympus-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zap-claw-jerry
  template:
    metadata:
      labels:
        app: zap-claw-jerry
    spec:
      containers:
        - name: jerry
          image: zap-claw:latest
          imagePullPolicy: IfNotPresent
          command: ["npm", "run", "jerry"]
          ports:
            - containerPort: 3300
          envFrom:
            - secretRef:
                name: zap-claw-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: zap-claw-jerry
  namespace: olympus-agents
spec:
  selector:
    app: zap-claw-jerry
  ports:
    - protocol: TCP
      port: 3300
      targetPort: 3300
  type: ClusterIP

---
# ==========================================
# SPIKE (Structural Builder - Port 3301)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zap-claw-spike
  namespace: olympus-agents
spec:
  # Spike can scale horizontally to support massive parallel extraction
  replicas: 5
  selector:
    matchLabels:
      app: zap-claw-spike
  template:
    metadata:
      labels:
        app: zap-claw-spike
    spec:
      containers:
        - name: spike
          image: zap-claw:latest
          imagePullPolicy: IfNotPresent
          command: ["pnpm", "run", "spike"]
          ports:
            - containerPort: 3301
          envFrom:
            - secretRef:
                name: zap-claw-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: zap-claw-spike
  namespace: olympus-agents
spec:
  selector:
    app: zap-claw-spike
  ports:
    - protocol: TCP
      port: 3301
      targetPort: 3301
  type: ClusterIP
