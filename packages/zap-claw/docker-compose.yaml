# BLAST-IRONCLAD Phase 5: Hardened Docker Fleet Configuration
# Security directives: cap_drop ALL, no-new-privileges, tmpfs bounds,
# memory limits, and PID limits on all containers.

# Shared security anchors
x-agent-security: &agent-security
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp:mode=1777,size=256m
  mem_limit: 1g
  pids_limit: 128

x-gateway-security: &gateway-security
  cap_drop:
    - ALL
  cap_add:
    - NET_BIND_SERVICE
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp:mode=1777,size=512m
  mem_limit: 2g
  pids_limit: 256

services:
  gateway:
    image: zap-claw-agent:latest
    build: .
    container_name: zap-claw-gateway
    ports:
      - "3900:3900"
    env_file: .env
    command: ["npm", "run", "gateway"]
    restart: unless-stopped
    <<: *gateway-security
    networks:
      - default
      - zap-net

  daemon:
    image: zap-claw-agent:latest
    build: .
    container_name: zap-claw-daemon
    ports:
      - "8000:8000"
    env_file: .env
    command: ["npm", "run", "daemon"]
    restart: unless-stopped
    <<: *gateway-security
    networks:
      - default
      - zap-net

  jerry:
    image: vefaas-public/all-in-one-sandbox:latest
    build: .
    container_name: zap-claw-jerry
    env_file: .env
    command: ["npm", "run", "jerry"]
    restart: unless-stopped
    <<: *agent-security
    depends_on:
      - daemon
    networks:
      - default
      - zap-net

  spike:
    image: vefaas-public/all-in-one-sandbox:latest
    build: .
