services:
  gateway:
    image: zap-claw-agent:latest
    build: .
    container_name: zap-claw-gateway
    ports:
      - "3900:3900"
    env_file: .env
    command: ["npm", "run", "gateway"]
    restart: unless-stopped
    networks:
      - default
      - zap-net

  daemon:
    image: zap-claw-agent:latest
    build: .
    container_name: zap-claw-daemon
    ports:
      - "8000:8000"
    env_file: .env
    command: ["npm", "run", "daemon"]
    restart: unless-stopped
    networks:
      - default
      - zap-net

  jerry:
    image: vefaas-public/all-in-one-sandbox:latest
    build: .
    container_name: zap-claw-jerry
    env_file: .env
    command: ["npm", "run", "jerry"]
    restart: unless-stopped
    depends_on:
      - daemon
    networks:
      - default
      - zap-net

  spike:
    image: vefaas-public/all-in-one-sandbox:latest
    build: .
    container_name: zap-claw-spike
    env_file: .env
    command: ["npm", "run", "spike"]
    restart: unless-stopped
    depends_on:
      - daemon
    networks:
      - default
      - zap-net

  thomas:
    image: zap-claw-agent:latest
    build: .
    container_name: zap-claw-thomas
    env_file: .env
    command: ["npm", "run", "tommy"]
    restart: unless-stopped
    depends_on:
      - daemon
    networks:
      - default
      - zap-net

  athena:
    image: zap-claw-agent:latest
    build: .
    container_name: zap-claw-athena
    env_file: .env
    volumes:
      - /Users/zap/.notebooklm:/root/.notebooklm
    command: ["npm", "run", "athena"]
    restart: unless-stopped
    depends_on:
      - daemon
    networks:
      - default
      - zap-net

  hermes:
    image: zap-claw-agent:latest
    build: .
    container_name: zap-claw-hermes
    env_file: .env
    command: ["npm", "run", "hermes"]
    restart: unless-stopped
    depends_on:
      - daemon
    networks:
      - default
      - zap-net

  hawk:
    image: zap-claw-agent:latest
    build: .
    container_name: zap-claw-hawk
    env_file: .env
    command: ["npm", "run", "hawk"]
    restart: unless-stopped
    depends_on:
      - daemon
    networks:
      - default
      - zap-net

  nova:
    image: zap-claw-agent:latest
    build: .
    container_name: zap-claw-nova
    env_file: .env
    command: ["npm", "run", "nova"]
    restart: unless-stopped
    depends_on:
      - daemon
    networks:
      - default
      - zap-net

  raven:
    image: zap-claw-agent:latest
    build: .
    container_name: zap-claw-raven
    env_file: .env
    command: ["npm", "run", "raven"]
    restart: unless-stopped
    depends_on:
      - daemon
    networks:
      - default
      - zap-net

  scout:
    image: zap-claw-agent:latest
    build: .
    container_name: zap-claw-scout
    env_file: .env
    command: ["npm", "run", "scout"]
    restart: unless-stopped
    depends_on:
      - daemon
    networks:
      - default
      - zap-net

  coder:
    image: zap-claw-agent:latest
    build: .
    container_name: zap-claw-coder
    env_file: .env
    command: ["npm", "run", "coder"]
    restart: unless-stopped
    depends_on:
      - daemon
    networks:
      - default
      - zap-net

  architect:
    image: zap-claw-agent:latest
    build: .
    container_name: zap-claw-architect
    env_file: .env
    command: ["npm", "run", "architect"]
    restart: unless-stopped
    depends_on:
      - daemon
    networks:
      - default
      - zap-net

  cleo:
    image: zap-claw-agent:latest
    build: .
    container_name: zap-claw-cleo
    env_file: .env
    command: ["npm", "run", "cleo"]
    restart: unless-stopped
    depends_on:
      - daemon
    networks:
      - default
      - zap-net

networks:
  zap-net:
    external: true
